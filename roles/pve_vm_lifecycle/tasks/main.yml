---
- name: Create VM
  ansible.builtin.include_tasks: create.yml
  when: vm_action == "create"
  tags: lifecycle

- name: Start VM
  ansible.builtin.include_tasks: start.yml
  when: vm_action == "start"
  tags: lifecycle

- name: Stop VM
  ansible.builtin.include_tasks: stop.yml
  when: vm_action == "stop"
  tags: lifecycle

- name: Delete VM
  ansible.builtin.include_tasks: delete.yml
  when: vm_action == "delete"
  tags: lifecycle
