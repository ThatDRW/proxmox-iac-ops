---
- name: Create LXC container
  community.general.proxmox:
    api_host: "{{ pve_api_host }}"
    api_user: "{{ pve_api_user }}"
    api_token_id: "{{ pve_api_token_id }}"
    api_token_secret: "{{ pve_api_token_secret }}"
    node: "{{ pve_node }}"
    vmid: "{{ pve_lxc_id }}"
    hostname: "{{ inventory_hostname }}"
    ostemplate: "{{ pve_lxc_lifecycle_template }}"
    memory: "{{ pve_lxc_lifecycle_memory }}"
    cores: "{{ pve_lxc_lifecycle_cores }}"
    rootfs: "{{ pve_lxc_lifecycle_rootfs }}"
    state: present
  delegate_to: localhost

- name: Start container after creation
  ansible.builtin.include_tasks: start.yml
  when: pve_lxc_lifecycle_start_after_create
