---
- name: Resolve service list
  ansible.builtin.set_fact:
    _verify_service_targets: >-
      {{ verify_service_targets if verify_service_targets | length > 0 else service_common_services | default([]) }}

- name: Assert service list is not empty
  ansible.builtin.assert:
    that:
      - _verify_service_targets | length > 0
    fail_msg: >
      No services to verify. Define verify_service_targets or ensure
      service_common_services is populated via service_common.

- name: Verify service state on Debian (systemd)
  ansible.builtin.include_tasks: systemd.yml
  when: ansible_os_family == "Debian"

- name: Verify service state on Alpine (openrc)
  ansible.builtin.include_tasks: openrc.yml
  when: ansible_os_family == "Alpine"
