---
pve_snapshot_enabled: true

# Naming incorporates env, host, operation and epoch for uniqueness
# and traceability. Format: pre_<env>_<host>_<operation>_<epoch>
pve_snapshot_name: >-
  pre_{{ env | default('unknown') }}_{{ inventory_hostname }}_{{ pve_snapshot_operation | default('operation') }}_{{ ansible_date_time.epoch }}

pve_snapshot_operation: operation

# Metadata written to the snapshot description field in Proxmox
pve_snapshot_metadata:
  env: "{{ env | default('unknown') }}"
  host: "{{ inventory_hostname }}"
  operation: "{{ pve_snapshot_operation | default('operation') }}"
  timestamp: "{{ ansible_date_time.iso8601 }}"
  triggered_by: "ansible"

pve_snapshot_description: >-
  env={{ pve_snapshot_metadata.env }}
  host={{ pve_snapshot_metadata.host }}
  operation={{ pve_snapshot_metadata.operation }}
  timestamp={{ pve_snapshot_metadata.timestamp }}
  triggered_by={{ pve_snapshot_metadata.triggered_by }}
