---
- name: Resolve snapshot name
  ansible.builtin.debug:
    msg: "Creating LXC snapshot: {{ pve_snapshot_name }}"

- name: Create LXC snapshot
  community.general.proxmox:
    api_host: "{{ pve_api_host }}"
    api_user: "{{ pve_api_user }}"
    api_token_id: "{{ pve_api_token_id }}"
    api_token_secret: "{{ pve_api_token_secret }}"
    node: "{{ pve_node }}"
    vmid: "{{ pve_lxc_id }}"
    state: snapshot
    snapname: "{{ pve_snapshot_name }}"
    description: "{{ pve_snapshot_description }}"
  delegate_to: localhost
  register: pve_snapshot_lxc_result

- name: Record snapshot name for rollback reference
  ansible.builtin.set_fact:
    pve_snapshot_last_name: "{{ pve_snapshot_name }}"
