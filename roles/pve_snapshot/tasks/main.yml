---
- name: Skip snapshot if disabled
  ansible.builtin.debug:
    msg: "Snapshots disabled — skipping for {{ inventory_hostname }}"
  when: not pve_snapshot_enabled
  tags: snapshot

- name: Snapshot virtual machines
  ansible.builtin.include_tasks: vm.yml
  when:
    - pve_snapshot_enabled
    - "'pve_vms' in group_names"
  tags: snapshot

- name: Snapshot LXC containers
  ansible.builtin.include_tasks: lxc.yml
  when:
    - pve_snapshot_enabled
    - "'pve_lxc' in group_names"
  tags: snapshot
