---
- name: Stop VM before rollback
  community.general.proxmox_kvm:
    api_host: "{{ pve_api_host }}"
    api_user: "{{ pve_api_user }}"
    api_token_id: "{{ pve_api_token_id }}"
    api_token_secret: "{{ pve_api_token_secret }}"
    node: "{{ pve_node }}"
    vmid: "{{ pve_vm_id }}"
    state: stopped
    timeout: "{{ pve_rollback_stop_timeout }}"
  delegate_to: localhost
  when: pve_rollback_stop_before

- name: Rollback VM from snapshot
  community.general.proxmox_kvm:
    api_host: "{{ pve_api_host }}"
    api_user: "{{ pve_api_user }}"
    api_token_id: "{{ pve_api_token_id }}"
    api_token_secret: "{{ pve_api_token_secret }}"
    node: "{{ pve_node }}"
    vmid: "{{ pve_vm_id }}"
    state: rollback
    snapshot: "{{ pve_rollback_snapshot }}"
  delegate_to: localhost
  register: pve_rollback_vm_result

- name: Report VM rollback outcome
  ansible.builtin.debug:
    msg:
      - "VM rollback completed"
      - "Host: {{ inventory_hostname }}"
      - "VMID: {{ pve_vm_id }}"
      - "Snapshot: {{ pve_rollback_snapshot }}"

- name: Start VM after rollback
  community.general.proxmox_kvm:
    api_host: "{{ pve_api_host }}"
    api_user: "{{ pve_api_user }}"
    api_token_id: "{{ pve_api_token_id }}"
    api_token_secret: "{{ pve_api_token_secret }}"
    node: "{{ pve_node }}"
    vmid: "{{ pve_vm_id }}"
    state: started
  delegate_to: localhost
  when: pve_rollback_start_after
