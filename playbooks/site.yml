---
- name: Base entrypoint playbook
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Run deployment guard
      ansible.builtin.include_role:
        name: deployment_guard

  tasks:
    - name: Display execution context
      ansible.builtin.debug:
        msg:
          - "Environment: {{ env | default('undefined') }}"
          - "Host: {{ inventory_hostname }}"
