---
- name: Proxmox deployment workflow
  hosts: pve_all
  gather_facts: true

  pre_tasks:

    - name: Run deployment guard
      ansible.builtin.include_role:
        name: deployment_guard
      tags: guard

    - name: Create pre-deployment snapshot
      ansible.builtin.include_role:
        name: pve_snapshot
      vars:
        pve_snapshot_operation: deploy
      tags: snapshot

  tasks:

    - name: Execute deployment with rollback protection
      block:

        - name: Execute VM lifecycle
          ansible.builtin.include_role:
            name: pve_vm_lifecycle
          when: "'pve_vms' in group_names"
          tags: lifecycle

        - name: Execute LXC lifecycle
          ansible.builtin.include_role:
            name: pve_lxc_lifecycle
          when: "'pve_lxc' in group_names"
          tags: lifecycle

        - name: Apply base OS configuration
          ansible.builtin.include_role:
            name: os_base
          tags: os

        - name: OS Hardening (Stage 1)
          ansible.builtin.include_role:
            name: os_hardening
          tags: hardening

        - name: Configure services
          ansible.builtin.include_role:
            name: service_common
          tags: services

        - name: Run verification framework
          ansible.builtin.include_role:
            name: verify_common
          tags: verify

      rescue:

        - name: Deployment failed — starting rollback
          ansible.builtin.debug:
            msg: "Failure detected. Initiating rollback."
          tags: rollback

        - name: Run rollback role
          ansible.builtin.include_role:
            name: pve_rollback
          vars:
            pve_rollback_snapshot: "{{ pve_snapshot_last_name | default(pve_snapshot_name) }}"
          tags: rollback

        - name: Fail deployment after rollback
          ansible.builtin.fail:
            msg: "Deployment failed and rollback executed."

  post_tasks:

    - name: Deployment completed successfully
      ansible.builtin.debug:
        msg: "Deployment workflow finished successfully"
