---
# ---------------------------------------------------------------------------
# VM lifecycle defaults
# ---------------------------------------------------------------------------
# Default action executed by pve_vm_lifecycle.
# Override per host in host_vars for targeted operations.
# Valid values: create | start | stop | delete
pve_vm_lifecycle_action: create

# Automatically start the VM after creation.
pve_vm_lifecycle_start_after_create: true

# Timeout in seconds for VM API operations.
# Inherits pve_operation_timeout from group_vars/pve_all.yml by default;
# override here if VMs require a longer wait (e.g. large disk provisioning).
pve_vm_lifecycle_timeout: "{{ pve_operation_timeout }}"

# ---------------------------------------------------------------------------
# Required — set per host in host_vars
# ---------------------------------------------------------------------------
# pve_vm_id must be defined in host_vars/<hostname>.yml for each VM.
# Example:
#   host_vars/vm-web-01.yml:
#     pve_vm_id: 101

# ---------------------------------------------------------------------------
# Verification
# ---------------------------------------------------------------------------
# Extend the base verify_common_roles from group_vars/all.yml with
# service-specific checks once services are defined in infra-live.
# Example:
#   verify_common_roles:
#     - verify_ssh
#     - verify_network
#     - verify_service
